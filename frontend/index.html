<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant RH IA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Assistant RH Intelligent</h1>
        <p>Déposez le fichier du CV puis cliquez sur Analyser</p>
        
        <label>Profil recherché</label>
        <textarea id="critere" placeholder="Exemple : Développeur Python avec expérience Django"></textarea>
        
        <label>Sélectionner le fichier du CV (PDF, DOCX, TXT)</label>
        <!-- Remplacement du textarea par un input file -->
        <input type="file" id="cvFile" accept=".pdf,.docx,.txt" style="display: block; width: 100%; margin: 10px 0; padding: 10px; border: 1px dashed #2563eb; border-radius: 10px;">
        
        <button onclick="analyser()">Analyser le CV</button>
        
        <div id="chargement">Analyse en cours...</div>
        <pre id="resultat"></pre>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
